// ── BILLING ──
function roundHalfHoursWithGrace(totalMs) {
  const totalMins = totalMs / 60000;
  const fullHalfHours = Math.floor(totalMins / 30);
  const remainder = totalMins - fullHalfHours * 30;
  return remainder >= 5 ? fullHalfHours + 1 : fullHalfHours;
}

function calcBillAuto(elapsedMs) {
  const rate = configRateAuto;
  const halfRate = rate / 2;
  const halfHoursCharged = roundHalfHoursWithGrace(elapsedMs);
  if(halfHoursCharged === 0) return 0;

  let total = 0;
  for(let block = 1; block <= halfHoursCharged; block++) {
    if(configFreeHour && (block === 5 || block === 6)) continue;
    total += halfRate;
  }
  total = Math.round(total);

  if(configMaxAutoOn) total = Math.min(total, configMaxAuto);
  return total;
}

function calcBillMoto(elapsedMs, entryDate) {
  const entry = new Date(entryDate);
  const exit  = new Date(entry.getTime() + elapsedMs);
  const rate    = configRateMoto;
  const dayRate = configRateMotoDay;

  if(configMotoDayOn) {
    // Tarifa diurna activa: fija hasta 5pm + extra después
    const limit5pm = new Date(entry);
    limit5pm.setHours(17, 0, 0, 0);
    if(exit <= limit5pm) return dayRate;
    const extraStart = entry < limit5pm ? limit5pm : entry;
    const extraMs    = exit - extraStart;
    const extraHalfHours = roundHalfHoursWithGrace(extraMs);
    const extraCost  = extraHalfHours * (rate / 2);
    return Math.round(dayRate + extraCost);
  } else {
    // Tarifa diurna desactivada: solo cobro por medias horas desde el inicio
    const halfHours = roundHalfHoursWithGrace(elapsedMs);
    return Math.round(halfHours * (rate / 2));
  }
}

// Evento: cobra igual que auto pero usando configRateEvento como tarifa por hora
// (sin máximo, sin hora gratis, solo medias horas)
function calcBillEvento(elapsedMs) {
  const halfRate = configRateEvento / 2;
  const halfHours = roundHalfHoursWithGrace(elapsedMs);
  return Math.round(halfHours * halfRate);
}

function calcBill(elapsedMs, type, entryDate) {
  if(type === 'moto')   return calcBillMoto(elapsedMs, entryDate);
  if(type === 'evento') return calcBillEvento(elapsedMs);
  return calcBillAuto(elapsedMs);
}

function billingDescription(elapsedMs, type, entryDate) {
  if(type === 'moto') {
    if(configMotoDayOn){
      const entry  = new Date(entryDate);
      const exit   = new Date(entry.getTime() + elapsedMs);
      const limit5pm = new Date(entry); limit5pm.setHours(17,0,0,0);
      if(exit <= limit5pm) return 'Tarifa fija diurna (8am-5pm)';
      const extraMs   = exit - (entry < limit5pm ? limit5pm : entry);
      const extraMins = Math.ceil(extraMs / 60000);
      return '$'+configRateMotoDay+' base + '+Math.ceil(extraMins/30)+' x 1/2hr extra ($'+configRateMoto+'/hr)';
    } else {
      const halfHours = roundHalfHoursWithGrace(elapsedMs);
      return halfHours+' x 1/2hr ($'+configRateMoto+'/hr sin diurna)';
    }
  }
  if(type === 'evento') {
    const halfHours = roundHalfHoursWithGrace(elapsedMs);
    return halfHours+' x 1/2hr · Tarifa evento ($'+configRateEvento+'/hr)';
  }
  // auto
  const halfHours = roundHalfHoursWithGrace(elapsedMs);
  if(configMaxAutoOn && calcBillAuto(elapsedMs) >= configMaxAuto)
    return 'Tarifa máxima ($'+configMaxAuto+')';
  const freeNote = (configFreeHour && halfHours > 4) ? ' · 3ª hora gratis' : '';
  return halfHours+' x 1/2hr'+freeNote;
}

// ── PROCESS ──
function getNextPlateCode(){
  const used=new Set(Object.keys(active).map(k=>parseInt(k)));
  for(let n=1;n<=99;n++) if(!used.has(n)) return String(n).padStart(2,'0');
  return null;
}
function extractPlateFromQR(raw){
  if(raw.includes('|')){
    const first=raw.split('|')[0].trim().toUpperCase();
    if(/^[A-Z0-9]{4,8}$/.test(first)) return first;
  }
  return null;
}
function isPlateQR(raw){
  const trimmed=raw.trim().toUpperCase();
  const asNum=parseInt(trimmed);
  if(/^\d+$/.test(trimmed)&&asNum>=1&&asNum<=220) return false;
  if(trimmed.includes('|')) return true;
  return /^[A-Z]{2,4}\d{2,4}[A-Z]{0,2}$/.test(trimmed);
}

function processCode(raw){
  const rawStr=raw.trim();
  const now=Date.now();
  if(rawStr===lastScanned&&now-lastScannedTime<3000) return;
  lastScanned=rawStr; lastScannedTime=now;
  if(isPlateQR(rawStr)){
    const plate=extractPlateFromQR(rawStr)||rawStr.split('|')[0].trim().toUpperCase();
    const existing=Object.entries(active).find(([c,rec])=>rec.plate&&rec.plate.toUpperCase()===plate.toUpperCase());
    if(existing){ openExitConfirm(existing[0]); }
    else{
      const nextCode=getNextPlateCode();
      if(!nextCode) return showFlash('Códigos 01-99 llenos','error');
      openVtypeModal(nextCode, plate);
    }
  }else{
    const asNum=parseInt(rawStr);
    if(isNaN(asNum)||asNum<1||asNum>220) return showFlash('Código no reconocido','error');
    const code=asNum<=99?String(asNum).padStart(2,'0'):String(asNum);
    if(active[code]){ openExitConfirm(code); }
    else if(asNum<=99){
      return showFlash('Código '+code+' no está activo. Solo se asigna al escanear una placa.','error');
    }
    else{ openVtypeModal(code, null); }
  }
}

function processEntry(code, type, plate){
  const safeCode=String(code||'').trim();
  if(!safeCode||safeCode==='null'||safeCode==='undefined'){ showFlash('Error interno: código inválido','error'); return; }
  const now=new Date();
  if(active[safeCode]){ openExitConfirm(safeCode); return; }
  active[safeCode]={entry:now, entryStr:formatTime(now), type:type||'auto', ...(plate?{plate}:{})};
  totalEntries++;
  const typeLabel = type==='moto'?'Moto':type==='evento'?'Evento':'Auto';
  const rangeLabel = parseInt(safeCode)<100?'Código placa':'Ficha';
  showFlash('Entrada · '+rangeLabel+' '+safeCode+' · '+typeLabel+(plate?' · '+plate:''), 'entry');
  showEntryTicket(safeCode, now, type||'auto', plate||null);
  printEntry(safeCode, type||'auto', formatTime(now), plate||null);
  render(); saveState();
}

function processExit(code){
  const safeCode=String(code||'').trim();
  if(!safeCode||!active[safeCode]){ showFlash('Error: vehículo no encontrado','error'); return; }
  const rec=active[safeCode];
  const entry=new Date(rec.entry);
  const exit=new Date();
  const elapsedMs=exit-entry;
  const hoursRaw=elapsedMs/3600000;
  const type=rec.type||'auto';
  const total=calcBill(elapsedMs, type, entry);
  const desc=billingDescription(elapsedMs, type, entry);
  const record={code:safeCode, type, entryStr:rec.entryStr, exitStr:formatTime(exit), hours:(elapsedMs/3600000).toFixed(2), total, desc};
  history.unshift(record);
  delete active[safeCode];
  showExitTicket(safeCode, type, rec.entryStr, formatTime(exit), hoursRaw, total, desc);
  printExit(safeCode, type, rec.entryStr, formatTime(exit), formatDuration(hoursRaw), total, desc);
  render(); saveState();
}

}

// ── HELPERS ──
function formatTime(d){ return d.toLocaleTimeString(‘es-MX’,{hour:‘2-digit’,minute:‘2-digit’,second:‘2-digit’}); }
function formatDuration(h){
const hh=Math.floor(h), mm=Math.round((h-hh)*60);
if(hh===0) return mm+’ min’;
return mm>0?hh+’h ’+mm+‘min’:hh+‘h’;
}

// ── PRINTING ──
function isAndroid(){ return /android/i.test(navigator.userAgent); }
const ESC=’\x1B’, GS=’\x1D’;
const CMD={
init:ESC+’@’, centerOn:ESC+‘a\x01’, leftOn:ESC+‘a\x00’,
boldOn:ESC+‘E\x01’, boldOff:ESC+‘E\x00’,
dblBoth:ESC+’!\x30’, normal:ESC+’!\x00’,
feed:’\n’, cut:GS+‘V\x41\x03’
};
function strToBytes(str){ const a=[]; for(let i=0;i<str.length;i++) a.push(str.charCodeAt(i)&0xFF); return a; }
function bytesToBase64(bytes){ let b=’’; for(const x of bytes) b+=String.fromCharCode(x); return btoa(b); }
function line(c=’-’,w=32){ return c.repeat(w); }

function qrESCPOS(text){
const store=String.fromCharCode(0x1D,0x28,0x6B,0x03,0x00,0x31,0x43,0x08);
const errLvl=String.fromCharCode(0x1D,0x28,0x6B,0x03,0x00,0x31,0x45,0x31);
const len=text.length+3, lenL=len&0xFF, lenH=(len>>8)&0xFF;
const store2=String.fromCharCode(0x1D,0x28,0x6B,lenL,lenH,0x31,0x50,0x30)+text;
const print=String.fromCharCode(0x1D,0x28,0x6B,0x03,0x00,0x31,0x51,0x30);
return store+errLvl+store2+print;
}

function buildEntryTicketESCPOS(code,type,entryStr,plate){
const typeLabel=type===‘moto’?‘MOTO / MOTOTAXI’:type===‘evento’?‘EVENTO’:‘AUTOMOVIL’;
const fecha=new Date().toLocaleDateString(‘es-MX’,{day:‘2-digit’,month:‘2-digit’,year:‘numeric’});
let d=’’;
d+=String.fromCharCode(0x1B,0x33,0x00);
d+=String.fromCharCode(0x1B,0x4A,0x01);
d+=CMD.init+CMD.centerOn;
d+=CMD.dblBoth+‘LUMY-V\n’+CMD.normal;
d+=‘ESTACIONAMIENTO\n’+line()+’\n’;
d+=CMD.boldOn+‘TICKET DE ENTRADA\n’+CMD.boldOff+line()+’\n’;
d+=CMD.centerOn+qrESCPOS(String(code))+’\n’;
d+=CMD.dblBoth+String(code)+’\n’+CMD.normal;
d+=‘FICHA DE ESTACIONAMIENTO\n’+line(’-’)+’\n’;
d+=CMD.leftOn;
d+=‘Tipo    : ‘+typeLabel+’\n’;
d+=‘Fecha   : ‘+fecha+’\n’;
d+=‘Entrada : ‘+entryStr+’\n’;
if(plate) d+=‘Placa   : ‘+plate+’\n’;
d+=line(’-’)+’\n’;
d+=CMD.centerOn;
d+=‘Escanee el QR a la salida\n’;
d+=‘Conserve este ticket\n’;
d+=line(’-’)+’\n’;
d+=‘Tel: 449 894 7691\n’;
d+=‘M. Sabino Crespo No. 70\n’;
d+=‘Ejutla de Crespo, Oax.\n’;
d+=line()+’\n’+CMD.feed+CMD.feed+CMD.cut;
return d;
}

function buildExitTicketESCPOS(code,type,entryStr,exitStr,elapsed,total,desc){
const typeLabel=type===‘moto’?‘MOTO / MOTOTAXI’:type===‘evento’?‘EVENTO’:‘AUTOMOVIL’;
const fecha=new Date().toLocaleDateString(‘es-MX’,{day:‘2-digit’,month:‘2-digit’,year:‘numeric’});
let d=’’;
d+=String.fromCharCode(0x1B,0x4A,0x00);
d+=CMD.init+CMD.centerOn;
d+=CMD.dblBoth+‘LUMY-V\n’+CMD.normal;
d+=‘ESTACIONAMIENTO\n’+line()+’\n’;
d+=CMD.boldOn+‘TICKET DE SALIDA\n’+CMD.boldOff+line()+’\n’;
d+=CMD.leftOn;
d+=‘Ficha   : ‘+code+’\n’;
d+=‘Tipo    : ‘+typeLabel+’\n’;
d+=‘Fecha   : ‘+fecha+’\n’;
d+=‘Entrada : ‘+entryStr+’\n’;
d+=‘Salida  : ‘+exitStr+’\n’;
d+=line(’-’)+’\n’;
d+=CMD.centerOn+CMD.boldOn+CMD.dblBoth;
d+=‘TOTAL: $’+total+’\n’;
d+=CMD.normal+CMD.boldOff+line()+’\n’;
d+=‘Gracias por su visita\n’;
d+=line(’-’)+’\n’;
d+=‘Tel: 449 894 7691\n’;
d+=‘M. Sabino Crespo No. 70\n’;
d+=‘Ejutla de Crespo, Oax.\n’;
d+=line()+’\n’+CMD.feed+CMD.feed+CMD.cut;
return d;
}

function printRawBT(escposStr){
if(!isAndroid()){ showFlash(‘Impresión solo en Android con RawBT’,‘exit’); return; }
try{
const bytes=strToBytes(escposStr);
const b64=bytesToBase64(bytes);
window.location.href=‘rawbt:base64,’+b64;
}catch(e){ showFlash(’Error al imprimir: ’+e.message,‘error’); }
}

function printEntry(code,type,entryStr,plate){
if(!printingEnabled) return;
const isPlateCode=parseInt(code)<100;
if(isPlateCode) printRawBT(buildEntryTicketESCPOS(code,type,entryStr,plate));
}
function printExit(code,type,entryStr,exitStr,elapsed,total,desc){
if(!printingEnabled) return;
printRawBT(buildExitTicketESCPOS(code,type,entryStr,exitStr,elapsed,total,desc));
}
